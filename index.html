<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moments | Brand Logo Gallery</title>
    <style>
      :root {
        --bg: #eef4f8;
        --surface: #ffffff;
        --text: #0d1b2a;
        --muted: #415a77;
        --primary: #1b4965;
        --accent: #cae9ff;
        --line: #d9e2ec;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Trebuchet MS", sans-serif;
        line-height: 1.5;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 10%, #cae9ff, transparent 35%),
          radial-gradient(circle at 85% 0%, #bee9e8, transparent 25%),
          var(--bg);
      }

      .page {
        max-width: 1120px;
        margin: 0 auto;
        padding: 2rem 1.25rem 3rem;
      }

      .hero {
        background: linear-gradient(135deg, #0d1b2a, #1b4965 70%, #5fa8d3);
        color: #fff;
        border-radius: 18px;
        padding: 1.75rem 1.5rem;
        box-shadow: 0 16px 40px rgba(13, 27, 42, 0.28);
      }

      .hero h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(1.8rem, 2.4vw, 2.4rem);
        letter-spacing: 0.02em;
      }

      .hero p {
        margin: 0;
        max-width: 70ch;
        color: #e2f1ff;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 0.95rem;
        margin-top: 1rem;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 0.75rem;
        box-shadow: 0 8px 22px rgba(10, 42, 72, 0.06);
      }

      .logo-wrap {
        background: linear-gradient(180deg, #fff, #f5f8fb);
        border-radius: 10px;
        aspect-ratio: 4 / 3;
        border: 1px dashed #d0dbe8;
        display: grid;
        place-items: center;
        padding: 0.4rem;
      }

      .logo-wrap img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }

      .label {
        margin: 0.55rem 0 0;
        font-size: 0.92rem;
        color: var(--primary);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>Moments</h1>
        <p>Brand logo gallery for analysis and cropping workflows.</p>
      </section>

      <section class="grid" aria-label="Brand logos">
        <article class="card"><div class="logo-wrap"><img src="Aloft_logo.jpg" alt="Aloft" /></div><p class="label">Aloft</p></article>
        <article class="card"><div class="logo-wrap"><img src="Bulgari_logo.png" alt="Bulgari" /></div><p class="label">Bulgari</p></article>
        <article class="card"><div class="logo-wrap"><img src="Courtyard_logo.jpg" alt="Courtyard" /></div><p class="label">Courtyard</p></article>
        <article class="card"><div class="logo-wrap"><img src="JW_Marriott_logo.jpg" alt="JW Marriott" /></div><p class="label">JW Marriott</p></article>
        <article class="card"><div class="logo-wrap"><img src="Ritz_Carlton_logo.jpg" alt="Ritz Carlton" /></div><p class="label">Ritz Carlton</p></article>
        <article class="card"><div class="logo-wrap"><img src="Sheraton_logo.jpg" alt="Sheraton" /></div><p class="label">Sheraton</p></article>
      </section>
    </main>
  </body>
</html>
